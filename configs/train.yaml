env_id: "LunarLanderContinuous-v3"

trainer:
  accelerator: "auto"
  devices: 1
  max_steps: 1000000
  val_check_interval: 0
  log_every_n_steps: 1

agent:
  state_dim: 8
  action_dim: 2
  q_hidden_dim: 256
  policy_hidden_dim: 256
  q_lr: 3e-4
  policy_lr: 3e-4
  log_alpha_lr: 3e-4
  gamma: 0.99
  tau: 0.005
  target_entropy: -2.0

buffer:
  max_size: 1000000

runner:
  batch_size: 256
  seed: null
  warmup_steps: 10000

  agent_checkpoint: null
  buffer_save: null
  buffer_load: null

  gif_save: null

wandb:
  project: "SAC-LLCont"
